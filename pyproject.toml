[project]
name = "brownfield-cartographer"
version = "0.1.0"
description = "A codebase intelligence tool that analyzes repositories and maps their structure and data flow."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "networkx",
    "pydantic",
    "pyyaml>=6.0.3",
    "sqlglot",
    "tree-sitter",
    "tree-sitter-python",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
